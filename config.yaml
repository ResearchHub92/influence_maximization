# Project Configuration
project:
  name: "Influence Maximization with DDQN"
  version: "1.0"
  seed: 42

# Data settings
data:
  dataset_path: "data/soc-Epinions1.txt"
  max_nodes: 5000
  sampling_strategy: "largest_connected_component"
  
# Graph preprocessing
graph:
  remove_self_loops: true
  remove_isolated: true
  use_lcc: true
  
# Diffusion model settings
diffusion:
  model: "ic"
  num_simulations: 50
  
# DDQN Hyperparameters
ddqn:
  learning_rate: 0.0005
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  batch_size: 16
  memory_size: 5000
  target_update: 100
  hidden_dim: 64
  num_episodes: 100  # کاهش برای تست سریع
  max_seed_size: 5  # کاهش
  
# Training
training:
  device: "cpu"
  checkpoint_interval: 10
  log_interval: 5
  
# Evaluation
evaluation:
  baseline_methods: ["random", "degree"]
  num_seeds_list: [1, 3, 5]